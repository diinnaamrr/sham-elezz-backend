name: Prod Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: diinnaamrr
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diinnaamrr/sham-el-ezz-backend
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_PROD }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}

          script: |
            cd /var/www/sham-elezz-prod
            set -e

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ Neither docker compose nor docker-compose is installed on server"
              exit 1
            fi
            
            echo "🔐 Login to GHCR on server..."
            echo "${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "🚀 Pulling latest image..."
            docker pull ghcr.io/diinnaamrr/sham-el-ezz-backend:latest

            echo "📦 Syncing app files from latest image (no manual git pull needed)..."
            cp .env .env.backup.deploy 2>/dev/null || true
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true
            docker create --name sham_el_ezz_sync_tmp ghcr.io/diinnaamrr/sham-el-ezz-backend:latest >/dev/null

            # docker cp can fail on file/dir type conflicts from old deployments.
            # Stream a tar archive instead; tar extraction handles replacement safely.
            rm -rf /tmp/sham_sync_extract
            mkdir -p /tmp/sham_sync_extract
            docker cp sham_el_ezz_sync_tmp:/var/www/html/. /tmp/sham_sync_extract/
            tar -C /tmp/sham_sync_extract --exclude='.env' -cf - . | tar -C /var/www/sham-elezz-prod -xf -

            rm -rf /tmp/sham_sync_extract
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true
            if [ -f .env.backup.deploy ]; then
              mv .env.backup.deploy .env
            fi

            if [ -f .env ]; then
              if grep -q '^NGINX_PORT=' .env; then
                sed -i 's/^NGINX_PORT=.*/NGINX_PORT=8016/' .env
              else
                printf '\nNGINX_PORT=8016\n' >> .env
              fi
            else
              printf 'NGINX_PORT=8016\n' > .env
            fi

            echo "🔄 Recreating containers..."
            # nginx host port is fixed in docker-compose.prod.yml (8016:80), so no port auto-selection here.
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo "🧹 Clearing Laravel cache..."
            docker exec sham_el_ezz_app_prod php artisan optimize:clear || true

            echo "🩺 Checking running containers..."
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if [ -z "$(docker ps -q -f name=sham_el_ezz_nginx_prod)" ]; then
              echo "❌ nginx container is not running"
              docker logs sham_el_ezz_nginx_prod || true
              exit 1
            fi

            if [ -z "$(docker ps -q -f name=sham_el_ezz_app_prod)" ]; then
              echo "❌ app container is not running"
              docker logs sham_el_ezz_app_prod || true
              exit 1
            fi

            echo "✅ Deployment completed successfully"
