name: Prod Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: diinnaamrr
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diinnaamrr/sham-el-ezz-backend
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_PROD }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}

          script: |
            cd /var/www/sham-elezz-prod
            set -e

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ Neither docker compose nor docker-compose is installed on server"
              exit 1
            fi
            
            echo "🔐 Login to GHCR on server..."
            echo "${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "🚀 Pulling latest image..."
            docker pull ghcr.io/diinnaamrr/sham-el-ezz-backend:latest

            echo "📦 Syncing app files from latest image (no manual git pull needed)..."
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true
            docker create --name sham_el_ezz_sync_tmp ghcr.io/diinnaamrr/sham-el-ezz-backend:latest >/dev/null
            docker cp sham_el_ezz_sync_tmp:/var/www/html/. /var/www/sham-elezz-prod/
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true

            echo "🔄 Recreating containers..."
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo "🧹 Clearing Laravel cache..."
            docker exec sham_el_ezz_app_prod php artisan optimize:clear || true

            echo "🩺 Checking running containers..."
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if [ -z "$(docker ps -q -f name=sham_el_ezz_nginx_prod)" ]; then
              echo "❌ nginx container is not running"
              docker logs sham_el_ezz_nginx_prod || true
              exit 1
            fi

            if [ -z "$(docker ps -q -f name=sham_el_ezz_app_prod)" ]; then
              echo "❌ app container is not running"
              docker logs sham_el_ezz_app_prod || true
              exit 1
            fi

            echo "✅ Deployment completed successfully"
