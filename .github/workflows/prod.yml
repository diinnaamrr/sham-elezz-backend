name: Prod Deploy

on:
  push:
    branches: [main, master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: diinnaamrr
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diinnaamrr/sham-el-ezz-backend
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_PROD }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}

          script: |
            cd /var/www/sham-elezz-prod
            set -e

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ Neither docker compose nor docker-compose is installed on server"
              exit 1
            fi
            
            echo "🔐 Login to GHCR on server..."
            echo "${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "🚀 Pulling latest image..."
            docker pull ghcr.io/diinnaamrr/sham-el-ezz-backend:latest

            echo "📦 Syncing app files from latest image (no manual git pull needed)..."
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true
            docker create --name sham_el_ezz_sync_tmp ghcr.io/diinnaamrr/sham-el-ezz-backend:latest >/dev/null

            # docker cp can fail on file/dir type conflicts from old deployments.
            # Stream a tar archive instead; tar extraction handles replacement safely.
            rm -rf /tmp/sham_sync_extract
            mkdir -p /tmp/sham_sync_extract
            docker cp sham_el_ezz_sync_tmp:/var/www/html/. /tmp/sham_sync_extract/
            tar -C /tmp/sham_sync_extract -cf - . | tar -C /var/www/sham-elezz-prod -xf -

            rm -rf /tmp/sham_sync_extract
            docker rm -f sham_el_ezz_sync_tmp >/dev/null 2>&1 || true

            echo "🔄 Recreating containers..."
            RESOLVED_NGINX_PORT=$($COMPOSE_CMD -f docker-compose.prod.yml config --format json 2>/dev/null | python3 -c 'import json,sys; ports=json.load(sys.stdin)["services"]["nginx"].get("ports", []); print(next((str(p.get("published")) for p in ports if isinstance(p, dict) and str(p.get("target"))=="80" and p.get("published") is not None), ""))' || true)
            RESOLVED_NGINX_PORT=${RESOLVED_NGINX_PORT:-8016}
            echo "🌐 Resolved nginx host port: ${RESOLVED_NGINX_PORT}"
            if ss -ltn | grep -q ":${RESOLVED_NGINX_PORT} "; then
              echo "❌ Host port ${RESOLVED_NGINX_PORT} is already in use on server."
              echo "Set NGINX_PORT in /var/www/sham-elezz-prod/.env to a free port (example: 8016) and redeploy."
              exit 1
            fi
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo "🧹 Clearing Laravel cache..."
            docker exec sham_el_ezz_app_prod php artisan optimize:clear || true

            echo "🩺 Checking running containers..."
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if [ -z "$(docker ps -q -f name=sham_el_ezz_nginx_prod)" ]; then
              echo "❌ nginx container is not running"
              docker logs sham_el_ezz_nginx_prod || true
              exit 1
            fi

            if [ -z "$(docker ps -q -f name=sham_el_ezz_app_prod)" ]; then
              echo "❌ app container is not running"
              docker logs sham_el_ezz_app_prod || true
              exit 1
            fi

            echo "✅ Deployment completed successfully"
