services:
  app:
    # نفس الحزمة على GHCR: sham-el-ezz-backend — latest و main (غيّر IMAGE_TAG في .env لو حابب main)
    image: ghcr.io/diinnaamrr/sham-el-ezz-backend:${IMAGE_TAG:-latest}
    container_name: sham_el_ezz_app_prod
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sham-prod-network
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=http://sham-el-ezz.com/
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-asttoin}
      - DB_USERNAME=${DB_USERNAME:-asttoin}
      - DB_PASSWORD=${DB_PASSWORD:-Aa@201917110}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: sham_el_ezz_nginx_prod
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8016}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/ngnix/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sham-prod-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: sham_el_ezz_db_prod
    restart: unless-stopped
    environment:
      # مطابق لـ docker-compose.dev.yml (غيّر القيم في .env على السيرفر)
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-Aa@201917110}"
      MYSQL_DATABASE: ${DB_DATABASE:-asttoin}
      MYSQL_USER: ${DB_USERNAME:-asttoin}
      MYSQL_PASSWORD: "${DB_PASSWORD:-Aa@201917110}"
    volumes:
      - dbdata_prod:/var/lib/mysql
    networks:
      - sham-prod-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: sham_el_ezz_redis_prod
    restart: unless-stopped
    volumes:
      - redisdata_prod:/data
    networks:
      - sham-prod-network

  phpmyadmin:
    image: phpmyadmin:5
    container_name: sham_el_ezz_phpmyadmin_prod
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8051}:80"
    volumes:
      - ./docker/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 512M
    networks:
      - sham-prod-network
    depends_on:
      - db

networks:
  sham-prod-network:
    driver: bridge

volumes:
  dbdata_prod:
    driver: local
  redisdata_prod:
    driver: local
