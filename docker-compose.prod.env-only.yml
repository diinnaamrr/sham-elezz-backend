# Alternative: Use ONLY environment variables (no .env file needed)
# Set these as environment variables on your server or use a secrets manager

services:
  app:
    image: ghcr.io/diinnaamrr/sham-el-ezz-backend:${IMAGE_TAG:-main}
    container_name: sham_el_ezz_app_prod_env_only
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sham-prod-network
    depends_on:
      - db
      - redis
    environment:
      # Laravel App
      - APP_NAME=${APP_NAME:-Wayak}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://sham-el-ezz.com/}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      
      # Database (نفس منطق dev: قيم افتراضية + تقدر تغيّرها من متغيرات البيئة)
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-asttoin}
      - DB_USERNAME=${DB_USERNAME:-asttoin}
      - DB_PASSWORD=${DB_PASSWORD:-Aa@201917110}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      
      # Cache & Session
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      
      # Mail (if needed)
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}

  nginx:
    image: nginx:alpine
    container_name: sham_el_ezz_nginx_prod_env_only
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8016}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/ngnix/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sham-prod-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: sham_el_ezz_db_prod_env_only
    restart: unless-stopped
    environment:
      # مطابق لـ docker-compose.dev.yml (استبدل القيم من البيئة في الإنتاج الحقيقي)
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-Aa@201917110}"
      MYSQL_DATABASE: ${DB_DATABASE:-asttoin}
      MYSQL_USER: ${DB_USERNAME:-asttoin}
      MYSQL_PASSWORD: "${DB_PASSWORD:-Aa@201917110}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./backups:/backups
    networks:
      - sham-prod-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: sham_el_ezz_redis_prod_env_only
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - sham-prod-network
    command: redis-server --appendonly yes

networks:
  sham-prod-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local

